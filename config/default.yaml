v4l2:
  device_path: /dev/video1
  width: 1920
  height: 1080
  framerate: 60.0
  pixel_format: mjpeg
  invert_image: false

debug:
  show_window: true
  draw_overlay: true

runtime:
  max_input_age_ms: 25
  max_observation_age_ms: 35
  max_infer_fps: 60
  warmup_frames: 30
  engine_path: "models/exp.engine"
  hit_confirm_frames: 3
  hit_release_frames: 5
  debug_enabled: false
  debug_max_fps: 30
  record_enabled: false
  record_queue_size: 16

inference:
  backend: model
  model_path: models/exp.onnx

streaming:
  enabled: false
  host: "127.0.0.1"
  port: 5004
  sdp_path: "/tmp/laser_guidance.sdp"
  encoder: "h264_nvenc"

udp:
  enabled: true
  host: "127.0.0.1"
  port: 5001

ekf:
  process_noise_q: 0.5
  measurement_noise_r: 0.2
  initial_pos_std: 100.0
  initial_vel_std: 500.0
  initial_acc_std: 1000.0
  max_missed_frames: 10
