v4l2:
  device_path: /dev/video1
  width: 1920
  height: 1080
  framerate: 60.0
  pixel_format: mjpeg
  invert_image: false

debug:
  show_window: true
  draw_overlay: true

runtime:
  max_input_age_ms: 25
  max_observation_age_ms: 35
  max_infer_fps: 60
  warmup_frames: 30
  engine_path: "models/exp.engine"
  hit_confirm_frames: 3
  hit_release_frames: 5
  debug_enabled: false
  debug_max_fps: 30
  record_enabled: false
  record_queue_size: 16

inference:
  backend: tensorrt
  model_path: models/exp.engine

streaming:
  enabled: true
  host: "127.0.0.1"
  port: 5002
  sdp_path: "/tmp/laser_guidance.sdp"
  encoder: "libx264"

udp:
  enabled: true
  host: "127.0.0.1"
  port: 5001
