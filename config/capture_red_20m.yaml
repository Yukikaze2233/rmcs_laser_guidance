v4l2:
  device_path: /dev/video3
  width: 1920
  height: 1080
  framerate: 60.0
  pixel_format: mjpeg
  invert_image: false

debug:
  show_window: true
  draw_overlay: true

inference:
  backend: bright_spot
  model_path: ""

record:
  output_root: ./videos
  duration_seconds: 120
  lighting_tag: indoor_lab
  background_tag: plain_wall
  distance_tag: 20m
  target_color: red
