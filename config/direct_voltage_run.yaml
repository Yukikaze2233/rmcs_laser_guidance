v4l2:
  device_path: /dev/video2
  width: 1920
  height: 1080
  framerate: 60.0
  pixel_format: mjpeg
  invert_image: false

debug:
  show_window: true
  draw_overlay: true

runtime:
  max_input_age_ms: 25
  max_observation_age_ms: 35
  max_infer_fps: 60
  warmup_frames: 30
  engine_path: "models/exp.engine"
  hit_confirm_frames: 3
  hit_release_frames: 5
  debug_enabled: true
  debug_max_fps: 30
  record_enabled: true
  record_queue_size: 16

inference:
  backend: model
  model_path: models/exp.onnx

streaming:
  enabled: true
  host: "127.0.0.1"
  port: 5004
  sdp_path: "/tmp/laser_guidance.sdp"
  encoder: "h264_nvenc"

udp:
  enabled: true
  host: "127.0.0.1"
  port: 5001

ekf:
  process_noise_q: 0.20
  measurement_noise_r: 0.15
  initial_pos_std: 100.0
  initial_vel_std: 100.0
  initial_acc_std: 35.0
  max_missed_frames: 5
  lookahead_ms: 8.0

guidance:
  enabled: true
  command_model: direct_voltage
  calib_mode: false
  target_geometry:
    - class_id: 0
      width_mm: 72.0
      height_mm: 50.0
    - class_id: 1
      width_mm: 72.0
      height_mm: 50.0
    - class_id: 2
      width_mm: 72.0
      height_mm: 50.0
  voltage_model_path: "models/vision_voltage_poly_v5.yaml"
  voltage_use_ekf_center: true
  voltage_limit_v: 5.0
  camera_calib_path: "config/camera_calib.yaml"
  t_x_mm: -92.5
  t_y_mm: 30.0
  t_z_mm: 100.0
  r_x_deg: -0.96
  r_y_deg: 0.48
  r_z_deg: -1.19
  mirror_separation_mm: 15.0
  max_optical_angle_deg: 30.0
  input_voltage_range_v: 5.0
  dac_voltage_range_v: 10.0
  wiring:
    mode: differential
    x_plus_channel: 0
    x_minus_channel: 2
    y_plus_channel: 1
    y_minus_channel: 3
  scan_mode: rectangle
  scan_width_deg: 0.08
  scan_height_deg: 0.10
  scan_grid_n: 8
